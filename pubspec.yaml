name: how_pranked_my_house
description: "Scan your house for pranks, traps, and general chaos."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.10.6
  # Object Detection — gives bounding boxes + coarse labels
  google_mlkit_object_detection: ^0.13.1
  # Image Labeling — runs on whole frame, returns 400+ specific labels
  # (Cat, Toy vehicle, Clutter, Furniture, etc.)
  google_mlkit_image_labeling: ^0.13.0
  path_provider: ^2.1.5
  path: ^1.9.1
  permission_handler: ^11.4.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/HowHomeAloneMyHouseWithCats.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/HowHomeAloneMyHouseWithCats.png"
  min_sdk_android: 21